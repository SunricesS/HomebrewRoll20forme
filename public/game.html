<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DnD Masaüstü - Oyun</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app-container">
        <!-- Sol Taraf (%75): Oyun Haritası -->
        <div id="game-map">
            <div id="map-content">
                <canvas id="drawing-layer"></canvas>
                <!-- Token Sistemi -->
            </div>
        </div>

        <!-- Sağ Taraf (%25): Kontrol Paneli -->
        <div id="control-panel">
            <h3>Kontrol Paneli</h3>
            <p>Durum: <span id="status">Bağlanıyor...</span></p>

            <!-- Zar Atma Paneli -->
            <div id="dice-panel" class="dice-panel">
                <button class="dice-btn" data-dice="4">d4</button>
                <button class="dice-btn" data-dice="6">d6</button>
                <button class="dice-btn" data-dice="8">d8</button>
                <button class="dice-btn" data-dice="10">d10</button>
                <button class="dice-btn" data-dice="12">d12</button>
                <button class="dice-btn" data-dice="20">d20</button>
            </div>
            <ul id="logs">
                <li>Odaya bekleniyor...</li>
            </ul>

            <!-- Sadece DM'ye görünecek Araçlar Bölümü -->
            <div id="dm-tools" class="hidden dm-tools-section">
                <div class="dm-tools-header">
                    <h4>DM Araçları</h4>
                    <div class="dm-tools-actions">
                        <button class="btn primary action-btn dm-save-btn" id="btn-force-save">Harita Kaydet</button>
                        <button class="btn secondary dm-gallery-btn"
                            onclick="window.open('/gallery.html', '_blank')">Galeriyi Aç</button>
                    </div>
                </div>

                <details class="dm-collapsible dm-create-token-section">
                    <summary>Yeni Token Oluştur</summary>
                    <div class="dm-collapsible-body">
                        <div class="form-group">
                            <label>İşaret/Token Adı (harf):</label>
                            <input type="text" id="dm-marker-name" maxlength="2" placeholder="Ör: G"
                                class="input-light">
                        </div>
                        <div class="form-group form-group-relative">
                            <label>İşaret Resim URL (Opsiyonel):</label>
                            <input type="text" id="dm-marker-img" placeholder="URL girin veya resim sürükleyin..."
                                class="input-light">
                        </div>
                        <div class="form-group">
                            <label>Renk:</label>
                            <input type="color" id="dm-marker-color" value="#f1c40f">
                        </div>
                        <div class="stats-grid stats-grid-3col">
                            <div class="form-group"><label>Mevcut HP:</label><input type="number" id="dm-marker-hp"
                                    placeholder="örn: 10"></div>
                            <div class="form-group"><label>Maks HP:</label><input type="number" id="dm-marker-max-hp"
                                    placeholder="örn: 10"></div>
                            <div class="form-group"><label>Boyut (px):</label><input type="number" id="dm-marker-size"
                                    value="50"></div>
                        </div>
                        <button id="btn-add-marker" class="btn primary action-btn">İşaret Ekle</button>
                    </div>
                </details>

                <hr class="dm-divider">

                <h4>DM Kalem Rengi</h4>
                <div class="form-group">
                    <label>Çizim Rengi:</label>
                    <input type="color" id="dm-pen-color" value="#8e44ad">
                </div>
                <button id="btn-update-dm-pen" class="btn primary action-btn dm-pen-btn">Rengi Güncelle</button>

                <hr class="dm-divider">

                <div class="form-group form-group-relative">
                    <label>Arka Plan URL:</label>
                    <input type="text" id="dm-bg-url" placeholder="URL girin veya resim sürükleyin..."
                        class="input-light">
                </div>
                <button id="btn-set-bg" class="btn secondary action-btn">Arka Planı Değiştir</button>
                <button id="btn-clear-all-drawings" class="btn danger action-btn">Tüm Çizimleri Temizle</button>

                <hr class="dm-divider dm-divider-spaced">

                <h4>Oyuncuları Yönet</h4>
                <div id="dm-player-list" class="list-container dm-player-list">
                    <p class="empty-state-text">Bağlı oyuncu yok.</p>
                </div>

                <div id="dm-player-editor" class="hidden character-card dm-player-editor">
                    <h4 id="dm-edit-name" class="dm-edit-name">Seçilen Oyuncu</h4>
                    <form id="dm-edit-form">
                        <div class="stats-grid stats-grid-2col">
                            <div class="form-group"><label>Mevcut HP:</label><input type="number" id="dm-edit-hp"></div>
                            <div class="form-group"><label>Maks HP:</label><input type="number" id="dm-edit-max-hp">
                            </div>
                        </div>
                        <div class="stats-grid">
                            <div class="form-group"><label>STR:</label><input type="number" id="dm-edit-str"></div>
                            <div class="form-group"><label>DEX:</label><input type="number" id="dm-edit-dex"></div>
                            <div class="form-group"><label>INT:</label><input type="number" id="dm-edit-int"></div>
                            <div class="form-group"><label>CON:</label><input type="number" id="dm-edit-con"></div>
                            <div class="form-group"><label>WIS:</label><input type="number" id="dm-edit-wis"></div>
                            <div class="form-group"><label>CHR:</label><input type="number" id="dm-edit-chr"></div>
                        </div>
                        <div class="button-group button-group-row">
                            <button type="button" id="dm-edit-save-btn" class="btn success action-btn dm-edit-action-btn" disabled>Kayıtlı</button>
                            <button type="button" class="btn back-btn action-btn dm-edit-action-btn"
                                onclick="if(typeof flushDmEdit === 'function') flushDmEdit(); document.getElementById('dm-player-editor').classList.add('hidden')">Kapat</button>
                        </div>
                    </form>
                </div>

                <p class="dm-hint-text">
                    * Bir işareti silmek için üzerine sağ tıklayın.
                </p>
            </div>

            <!-- Yalnızca Oyunculara Görünecek Bilgi Paneli -->
            <div id="player-info-panel" class="hidden player-info-section">
                <h4>Karakterim</h4>
                <div id="my-character-card" class="character-card">
                    <!-- JS ile doldurulacak -->
                </div>

                <hr class="dm-divider dm-divider-spaced">

                <h4>Token Özelleştir</h4>
                <div class="form-group form-group-relative">
                    <label>Token Resim URL:</label>
                    <input type="text" id="player-token-img" placeholder="URL girin veya resim sürükleyin..."
                        class="input-light">
                </div>
                <div class="form-group">
                    <label>Çizim ve Token Rengi:</label>
                    <input type="color" id="player-token-color" value="#3498db">
                </div>
                <button id="btn-update-token" class="btn primary action-btn">Uygula</button>

                <button id="btn-clear-my-drawings" class="btn warning action-btn">Sadece Benim Çizimlerimi
                    Temizle</button>

                <hr class="dm-divider dm-divider-spaced">

                <h4>Diğer Oyuncular</h4>
                <div id="other-players-list">
                    <!-- JS ile doldurulacak -->
                </div>
            </div>
        </div>
    </div>

    <!-- DM Marker Düzenleme Modalı -->
    <div id="dm-marker-editor-modal" class="hidden dm-modal-overlay">
        <div class="modal-box dm-modal-box">
            <h3 id="dm-marker-edit-title" class="dm-modal-title">Token Düzenle</h3>
            <div class="form-group">
                <label>Mevcut HP:</label>
                <input type="number" id="dm-marker-edit-hp">
            </div>
            <div class="form-group">
                <label>Boyut (px):</label>
                <input type="number" id="dm-marker-edit-size">
            </div>
            <div class="button-group button-group-row">
                <button id="btn-save-marker-edit" class="btn success action-btn dm-edit-action-btn">Kaydet</button>
                <button id="btn-cancel-marker-edit" class="btn back-btn action-btn dm-edit-action-btn">İptal</button>
            </div>
        </div>
    </div>

    <!-- Socket.io istemci scripti -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/client.js?v=3"></script>
</body>

</html>
