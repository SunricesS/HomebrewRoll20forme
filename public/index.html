<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DnD Masaüstü - Giriş</title>
    <link rel="stylesheet" href="css/style.css">

</head>

<body id="login-body">
    <div id="login-overlay">
        <div class="modal-box" id="role-selection">
            <h2>Giriş Yap</h2>
            <div class="button-group">
                <button id="btn-dm-login" class="btn primary">DM Girişi</button>
                <button id="btn-player-login" class="btn secondary">Kullanıcı Girişi</button>
            </div>
        </div>

        <div class="modal-box hidden" id="profile-selection">
            <h2>Profil Seç</h2>
            <div id="profile-list" class="list-container">
                <p>Profiller yükleniyor...</p>
            </div>
            <button class="btn back-btn" onclick="showRoleSelection()">Geri</button>
        </div>

        <div class="modal-box hidden" id="character-selection">
            <h2>Karakterini Seç</h2>
            <div id="character-list" class="list-container">
                <p>Karakterler yükleniyor...</p>
            </div>
            <button id="btn-create-character" class="btn success action-btn">Yeni Karakter Oluştur</button>
            <button class="btn back-btn" onclick="showProfileSelection()">Geri</button>
        </div>

        <div class="modal-box hidden" id="character-creation">
            <h2>Karakter Oluştur</h2>
            <form id="form-create-character">
                <div class="form-group">
                    <label>Karakter Adı:</label>
                    <input type="text" id="char-name" required>
                </div>
                <div class="form-group">
                    <label>Maksimum HP:</label>
                    <input type="number" id="char-hp-max" value="50" required>
                </div>
                <div class="stats-grid">
                    <div class="form-group"><label>STR:</label><input type="number" id="stat-str" value="10"></div>
                    <div class="form-group"><label>DEX:</label><input type="number" id="stat-dex" value="10"></div>
                    <div class="form-group"><label>INT:</label><input type="number" id="stat-int" value="10"></div>
                    <div class="form-group"><label>CON:</label><input type="number" id="stat-con" value="10"></div>
                    <div class="form-group"><label>WIS:</label><input type="number" id="stat-wis" value="10"></div>
                    <div class="form-group"><label>CHR:</label><input type="number" id="stat-chr" value="10"></div>
                </div>
                <div class="form-group">
                    <label>Avatar URL (Opsiyonel):</label>
                    <input type="text" id="char-avatar" placeholder="https://...">
                </div>
                <div class="button-group">
                    <button type="submit" class="btn success">Oluştur ve Devam Et</button>
                    <button type="button" class="btn back-btn" onclick="showCharacterSelection()">İptal</button>
                </div>
            </form>
        </div>
    </div>
    <script src="js/login.js?v=2"></script>
</body>

</html>
