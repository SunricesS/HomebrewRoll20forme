<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Galeri - DND Masaüstü</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="gallery-body">

    <h1 class="gallery-title">Kayıtlı Resimler</h1>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Resim adıyla ara...">
    </div>

    <div class="gallery-grid" id="galleryGrid">
        <div class="loading">Resimler yükleniyor...</div>
    </div>

    <div id="toast" class="toast">URL Panoya Kopyalandı!</div>

    <script>
        let allImages = [];

        async function fetchImages() {
            try {
                const response = await fetch('/api/gallery-images');
                if (!response.ok) throw new Error('Network response was not ok');
                allImages = await response.json();
                renderImages(allImages);
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('galleryGrid').innerHTML = '<div class="loading" style="color: #e74c3c;">Resimler yüklenirken hata oluştu!</div>';
            }
        }

        function renderImages(images) {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';

            if (images.length === 0) {
                grid.innerHTML = '<div class="loading">Henüz eklenmiş resim yok.</div>';
                return;
            }

            images.forEach(img => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.title = img.name || '';

                const imgEl = document.createElement('img');
                imgEl.src = img.url;
                imgEl.alt = img.name || 'Resim';
                imgEl.loading = 'lazy';

                const titleDiv = document.createElement('div');
                titleDiv.className = 'gallery-item-title';
                titleDiv.textContent = img.name || 'İsimsiz';

                item.appendChild(imgEl);
                item.appendChild(titleDiv);

                item.addEventListener('click', () => copyToClipboard(img.url));
                grid.appendChild(item);
            });
        }

        function copyToClipboard(url) {
            if (navigator && navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(showToast).catch(() => {
                    fallbackCopyTextToClipboard(url);
                });
            } else {
                fallbackCopyTextToClipboard(url);
            }
        }

        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('Kopyalama basarisiz', err);
                alert("Kopyalanamadı: " + text);
            }
            document.body.removeChild(textArea);
        }

        function showToast() {
            const toast = document.getElementById("toast");
            toast.className = "toast show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allImages.filter(img => (img.name || '').toLowerCase().includes(term));
            renderImages(filtered);
        });

        window.addEventListener('DOMContentLoaded', fetchImages);
    </script>
</body>
</html>
