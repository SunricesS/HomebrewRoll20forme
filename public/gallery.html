<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Galeri - DND Masaüstü</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #1e272e;
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #3498db;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 30px auto;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #34495e;
            border-radius: 8px;
            background-color: #2c3e50;
            color: #ecf0f1;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-container input:focus {
            border-color: #3498db;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .gallery-item {
            background: #2c3e50;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .gallery-item img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            background: #1e272e;
            display: block;
        }

        .gallery-item-title {
            padding: 10px;
            font-size: 12px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #34495e;
        }

        .toast {
            visibility: hidden;
            min-width: 250px;
            margin-left: -125px;
            background-color: #27ae60;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            font-size: 17px;
        }

        .toast.show {
            visibility: visible;
            -webkit-animation: fadein 0.5s, fadeout 0.5s 2.5s;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @-webkit-keyframes fadein {
            from {bottom: 0; opacity: 0;} 
            to {bottom: 30px; opacity: 1;}
        }

        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }

        @-webkit-keyframes fadeout {
            from {bottom: 30px; opacity: 1;} 
            to {bottom: 0; opacity: 0;}
        }

        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }

        .loading {
            text-align: center;
            color: #bdc3c7;
            grid-column: 1 / -1;
            padding: 40px;
        }
    </style>
</head>
<body>

    <h1>Kayıtlı Resimler</h1>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Resim adıyla ara...">
    </div>

    <div class="gallery-grid" id="galleryGrid">
        <div class="loading">Resimler y&uuml;kleniyor...</div>
    </div>

    <div id="toast" class="toast">URL Panoya Kopyalandı!</div>

    <script>
        let allImages = [];

        // Supabase Endpoint'inden dataları çek
        async function fetchImages() {
            try {
                const response = await fetch('/api/gallery-images');
                if (!response.ok) throw new Error('Network response was not ok');
                allImages = await response.json();
                renderImages(allImages);
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('galleryGrid').innerHTML = '<div class="loading" style="color: #e74c3c;">Resimler y&uuml;klenirken hata oluştu!</div>';
            }
        }

        function renderImages(images) {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';

            if (images.length === 0) {
                grid.innerHTML = '<div class="loading">Henüz eklenmiş resim yok.</div>';
                return;
            }

            images.forEach(img => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.title = img.name;
                item.innerHTML = `
                    <img src="${img.url}" alt="${img.name}" loading="lazy">
                    <div class="gallery-item-title">${img.name}</div>
                `;
                item.onclick = () => copyToClipboard(img.url);
                grid.appendChild(item);
            });
        }

        // Kopyalama fonksiyonu
        function copyToClipboard(url) {
            if (navigator && navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(showToast).catch(err => {
                    fallbackCopyTextToClipboard(url);
                });
            } else {
                fallbackCopyTextToClipboard(url);
            }
        }

        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('Kopyalama basarisiz', err);
                alert("Kopyalanamadı: " + text);
            }
            document.body.removeChild(textArea);
        }

        // Toast bildirimi
        function showToast() {
            const toast = document.getElementById("toast");
            toast.className = "toast show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // Arama kısmı
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allImages.filter(img => (img.name || '').toLowerCase().includes(term));
            renderImages(filtered);
        });

        // Sayfa yüklenince resimleri çek
        window.addEventListener('DOMContentLoaded', fetchImages);
    </script>
</body>
</html>
